general {
    lock_cmd = pidof hyprlock || hyprlock
}

listener {
    timeout = 900
    on-timeout = loginctl lock-session
}

listener {
    timeout = 840
    on-timeout = hyprctl dispatch 'hl.dsp.dpms({action = "disable"})'
    on-resume = hyprctl dispatch 'hl.dsp.dpms({action = "enable", monitor = "DP-3"})'; sleep 1.5; hyprctl dispatch 'hl.dsp.dpms({action = "enable", monitor = "DP-1"})'
}

listener {
    timeout = 30
    on-timeout = pidof hyprlock && hyprctl dispatch 'hl.dsp.dpms({action = "disable"})'
    on-resume = hyprctl dispatch 'hl.dsp.dpms({action = "enable", monitor = "DP-3"})'; sleep 1.5; hyprctl dispatch 'hl.dsp.dpms({action = "enable", monitor = "DP-1"})'
}
